<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 320px; font-family: 'Segoe UI', system-ui, sans-serif;
  background: #F7F6F3; color: #093554; padding: 16px;
}
h2 { font-size: 14px; font-weight: 800; margin-bottom: 12px; }
.status { font-size: 12px; color: #5A7080; margin-bottom: 12px; }
.status.ok { color: #1A7A6D; }
.status.err { color: #a42547; }
.btn {
  display: block; width: 100%; padding: 10px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 8px;
}
.btn-primary { background: #C5993E; color: #fff; }
.btn-primary:hover { background: #b08832; }
.btn-google {
  background: #fff; color: #3c4043; border: 1.5px solid #D6D3CC;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-google:hover { background: #f8f8f8; border-color: #C5993E; }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
.btn-outline { background: none; border: 1.5px solid #D6D3CC; color: #093554; }
.btn-outline:hover { border-color: #C5993E; }
.field { margin-bottom: 10px; }
.field label { font-size: 11px; font-weight: 700; color: #5A7080; display: block; margin-bottom: 4px; }
.field input { width: 100%; padding: 8px 10px; border: 1.5px solid #D6D3CC; border-radius: 8px; font-size: 13px; }
.field input:focus { outline: none; border-color: #C5993E; }
.info { font-size: 11px; color: #5A7080; margin-top: 8px; line-height: 1.4; }
.divider { border-top: 1px solid #D6D3CC; margin: 12px 0; }
.or-divider {
  display: flex; align-items: center; gap: 8px; margin: 10px 0; font-size: 11px; color: #999;
}
.or-divider::before, .or-divider::after {
  content: ''; flex: 1; height: 1px; background: #D6D3CC;
}
#loginSection, #mainSection { display: none; }
</style>
</head>
<body>
  <h2>LAS LinkBoard Tracker <span style="font-size:9px;color:#f66">v9</span></h2>

  <div id="loginSection">
    <p class="status">Sign in to track email opens.</p>
    <button class="btn btn-google" id="googleBtn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div class="or-divider">or</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@las.ch">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Password">
    </div>
    <button class="btn btn-primary" id="loginBtn">Sign In</button>
    <div id="loginError" class="status err" style="display:none"></div>
  </div>

  <div id="mainSection">
    <p class="status ok" id="userInfo"></p>
    <p class="info" style="margin-bottom:12px">Tracking is <strong>on by default</strong> for new emails. Toggle the switch next to Send in Gmail to turn it on or off per email.</p>
    <div class="divider"></div>
    <p class="info">View your stats in the <a href="https://las-link-board.vercel.app" target="_blank" style="color:#C5993E;font-weight:600">LinkBoard dashboard</a> under Campaigns.</p>
    <div class="divider"></div>
    <button class="btn btn-outline" id="logoutBtn">Sign Out</button>
  </div>

  <div id="debugInfo" style="margin-top:10px; font-size:9px; color:#999; word-break:break-all; max-height:100px; overflow:auto; background:#ffe0e0; padding:6px; border-radius:4px; border:1px solid #f99; white-space:pre-wrap;">Loading debug...</div>

  <script src="popup.js"></script>
</body>
</html>
