name: VoiceType Desktop — Build & Release

on:
  push:
    tags:
      - 'voicetype-v*'   # e.g. voicetype-v0.1.0

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install SoX (macOS)
        if: runner.os == 'macOS'
        run: brew install sox

      - name: Install dependencies
        working-directory: voicetype-desktop
        run: npm ci || npm install

      - name: Build Electron app
        working-directory: voicetype-desktop
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            npx electron-builder --mac --publish never
          else
            npx electron-builder --win --publish never
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voicetype-${{ matrix.os }}
          path: |
            voicetype-desktop/dist/*.dmg
            voicetype-desktop/dist/*.zip
            voicetype-desktop/dist/*.exe
            voicetype-desktop/dist/*.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VoiceType ${{ github.ref_name }}"
          body: |
            ## VoiceType Desktop ${{ github.ref_name }}

            ### Downloads
            - **macOS**: Download the `.zip` file, unzip, and move VoiceType.app to Applications
            - **Windows**: Download the `.exe` installer and run it

            ### Getting Started
            1. Open VoiceType — on Mac, right-click and choose Open on first launch
            2. Sign in with your LinkBoard account
            3. Hold the hotkey to record, release to transcribe
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
